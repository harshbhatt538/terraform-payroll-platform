name: Deploy — Bureaus Portal

on:
  push:
    branches:
      - main
    paths:
      - 'docker/app/**'
      - '.github/workflows/deploy-bureaus.yml'

env:
  SERVICE_NAME: bureaus
  AWS_REGION: eu-west-2

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.SERVICE_NAME }}:test ./docker/app

      - name: Run container tests
        run: |
          docker run -d \
            --name test-${{ env.SERVICE_NAME }} \
            -p 8080:8080 \
            -e SERVICE_NAME=${{ env.SERVICE_NAME }} \
            -e APP_ENV=test \
            ${{ env.SERVICE_NAME }}:test

          sleep 3
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/
          docker stop test-${{ env.SERVICE_NAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push image to registry
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker tag ${{ env.SERVICE_NAME }}:test \
            ghcr.io/${{ github.repository }}/${{ env.SERVICE_NAME }}:$IMAGE_TAG
          docker push \
            ghcr.io/${{ github.repository }}/${{ env.SERVICE_NAME }}:$IMAGE_TAG

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.BUREAUS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=[
              "export GITHUB_REPOSITORY=${{ github.repository }}",
              "bash /home/ec2-user/deploy.sh ${{ env.SERVICE_NAME }} dev ${{ github.sha }}"
            ] \
            --comment "Deploy ${{ env.SERVICE_NAME }} ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}